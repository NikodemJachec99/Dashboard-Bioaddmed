services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../deploy/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    env_file:
      - ../.env
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/'); print('ok')\""]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ../backend
    command: celery -A config worker -l info
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ../backend
    command: celery -A config beat -l info
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: deploy/nginx/Dockerfile
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - static_data:/srv/static
      - media_data:/srv/media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  static_data:
  media_data:
